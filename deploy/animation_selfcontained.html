<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THEMANAGER REPORT</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: monospace;
  background: #f5f0e8;
  min-height: 100vh;
  padding: 1.25rem 1.25rem 0.5rem;
  color: #2a2520;
}

.scorecard { max-width: 560px; margin: 0 auto; }

.header {
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid #d4cab8;
}

.header-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: #2a2520;
  letter-spacing: -0.01em;
  text-align: center;
}

.header-second {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.header-tagline {
  font-family: 'Comic Sans MS', 'Marker Felt', cursive;
  font-size: 1rem;
  color: #968d80;
  font-weight: 400;
}

.header-date {
  font-family: 'Comic Sans MS', 'Marker Felt', cursive;
  font-size: 0.95rem;
  color: #b5756b;
}

.zones {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.75rem;
}

.zone-card {
  background: #fffcf5;
  border-radius: 0.5rem;
  border: 1px solid #e0d8cc;
  padding: 0.75rem;
  box-shadow: 0 2px 4px rgba(42,37,32,0.06);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.zone-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding-bottom: 0.5rem;
  margin-bottom: 0.5rem;
  border-bottom: 1px solid #ede5d6;
  flex-wrap: wrap;
}

.zone-icon { font-size: 1.1rem; }

.zone-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-right: auto;
}

.zone-metrics {
  display: grid;
  gap: 0.5rem;
  flex: 1;
  align-items: center;
  justify-items: center;
  text-align: center;
  padding: 0.25rem 0;
}

.hero-card { display: flex; flex-direction: column; }

.hero-value {
  font-family: 'Comic Sans MS', 'Marker Felt', cursive;
  font-size: 2.25rem;
  font-weight: 700;
  text-align: center;
  padding: 0.25rem 0.5rem 0.5rem;
  letter-spacing: -0.01em;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  padding: 0 0.5rem 0.25rem;
}

.hero-sub { display: flex; align-items: baseline; gap: 0.25rem; }

.hero-sub-value {
  font-family: 'Comic Sans MS', 'Marker Felt', cursive;
  font-size: 2.25rem;
  font-weight: 700;
}

.hero-sub-label {
  font-size: 0.625rem;
  color: #968d80;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.metric { display: flex; flex-direction: column; gap: 0.15rem; }

.metric-value {
  font-family: 'Comic Sans MS', 'Marker Felt', cursive;
  font-size: 2.25rem;
  font-weight: 700;
  line-height: 1.1;
}

.metric-label {
  font-size: 0.625rem;
  color: #968d80;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.footer {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px solid #e0d8cc;
  font-size: 0.625rem;
  color: #c4b8a8;
  text-align: center;
}

/* Live data badge */
.live-badge {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #0d9e4e;
  margin-left: 0.5rem;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Subtle entrance animation */
.zone-card {
  animation: fadeUp 0.6s ease-out both;
}
.zone-card:nth-child(1) { animation-delay: 0.05s; }
.zone-card:nth-child(2) { animation-delay: 0.1s; }
.zone-card:nth-child(3) { animation-delay: 0.15s; }
.zone-card:nth-child(4) { animation-delay: 0.2s; }
.zone-card:nth-child(5) { animation-delay: 0.25s; }
.zone-card:nth-child(6) { animation-delay: 0.3s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="scorecard">
  <div class="header">
    <div class="header-title">TheManager Report<span class="live-badge"></span></div>
    <div class="header-second">
      <span class="header-tagline">Tracking agentic coordination</span>
      <span class="header-date">2026-07-17</span>
    </div>
  </div>
  <div class="zones" id="board"></div>
  <div class="footer">Snapshot 2026-07-17 · Live board at regulardad6529.github.io/themanager-board</div>
</div>

<script>
// Data baked in at mint time — static snapshot
var DATA = {
  giphy: {
    channel_uploads: "214",
    channel_views: "117.4K",
    local_meme_cards: 194,
    approval_gifs: 3
  },
  meme_club: {
    current_winner: "nasimghanizadeh",
    current_winner_votes: 15720171,
    current_winner_voters: 19
  },
  do_something: {
    reviewed: 4,
    completed: 9,
    tracking: 10,
    ms_won: 19
  },
  vetting: {
    total_assessments: 50,
    pitfalls: 86
  },
  shill_watch: {
    total_shills_caught: 10
  },
  complaints: {
    card_images_posted: 275,
    complainers_recruited: 35,
    mentions_handled: 1106
  }
};

var ZONES = [
  {
    id: "giphy",
    label: "GIPHY",
    color: "#1a75ff",
    icon: "🎞️",
    layout: "grid",
    metrics: [
      { key: "channel_views", label: "Total Views", format: "string" },
      { key: "channel_uploads", label: "Uploads", format: "string" },
      { key: "local_meme_cards", label: "Meme Cards", format: "int" },
      { key: "approval_gifs", label: "Via Approval", format: "int" }
    ]
  },
  {
    id: "meme_club",
    label: "MEME CLUB",
    color: "#0d9e4e",
    icon: "🗳️",
    layout: "hero",
    metrics: [
      { key: "current_winner", label: "Leader", format: "handle" },
      { key: "current_winner_votes", label: "Votes", format: "votes" },
      { key: "current_winner_voters", label: "Voters", format: "int" }
    ]
  },
  {
    id: "do_something",
    label: "DO SOMETHING",
    color: "#e8a200",
    icon: "🎯",
    layout: "grid",
    metrics: [
      { key: "reviewed", label: "Submissions", format: "int" },
      { key: "completed", label: "Completed", format: "int" },
      { key: "tracking", label: "Tracking", format: "int" },
      { key: "ms_won", label: "MS Wins", format: "int" }
    ]
  },
  {
    id: "vetting",
    label: "VETTING",
    color: "#d94a00",
    icon: "👤",
    layout: "grid",
    metrics: [
      { key: "total_assessments", label: "Assessments", format: "int" },
      { key: "pitfalls", label: "Pitfalls", format: "int" }
    ]
  },
  {
    id: "shill_watch",
    label: "SHILL WATCH — MAYBE DIVE BAR",
    color: "#d62728",
    icon: "🔍",
    layout: "grid",
    metrics: [
      { key: "total_shills_caught", label: "Shills Caught", format: "int" }
    ]
  },
  {
    id: "complaints",
    label: "COMPLAINTS",
    color: "#7b3fb5",
    icon: "📞",
    layout: "grid",
    metrics: [
      { key: "card_images_posted", label: "Cards Posted", format: "int" },
      { key: "complainers_recruited", label: "Recruited", format: "int" },
      { key: "mentions_handled", label: "Mentions", format: "int" }
    ]
  }
];

function formatValue(value, fmt) {
  if (value === null || value === undefined) return "—";
  if (fmt === "int") return String(parseInt(value));
  if (fmt === "votes") {
    if (typeof value === "number") {
      if (value >= 1000000) return (value / 1000000).toFixed(1) + "M";
      if (value >= 1000) return (value / 1000).toFixed(1) + "K";
      return String(parseInt(value));
    }
    return String(value);
  }
  if (fmt === "handle") {
    return (value && !String(value).startsWith("@")) ? "@" + value : String(value);
  }
  return String(value);
}

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

(function render() {
  var html = "";
  for (var i = 0; i < ZONES.length; i++) {
    var zone = ZONES[i];
    var zd = DATA[zone.id] || {};
    var color = zone.color;
    var icon = zone.icon;
    var label = zone.label;
    var layout = zone.layout;

    if (layout === "hero") {
      var heroMetric = zone.metrics[0];
      var heroVal = formatValue(zd[heroMetric.key], heroMetric.format);
      var subHTML = "";
      for (var j = 1; j < zone.metrics.length; j++) {
        var m = zone.metrics[j];
        var val = formatValue(zd[m.key], m.format);
        subHTML += '<span class="hero-sub"><span class="hero-sub-value" style="color:' + color + '">' + esc(val) + '</span> <span class="hero-sub-label">' + esc(m.label) + '</span></span>';
      }
      html += '<div class="zone-card hero-card" style="border-color:' + color + '40;">' +
        '<div class="zone-header" style="border-bottom-color:' + color + '30;">' +
        '<span class="zone-icon">' + icon + '</span>' +
        '<span class="zone-label" style="color:' + color + '">' + esc(label) + '</span>' +
        '</div>' +
        '<div class="hero-value" style="color:' + color + '">' + esc(heroVal) + '</div>' +
        '<div class="hero-stats">' + subHTML + '</div>' +
        '</div>';
    } else {
      var metricsHTML = "";
      for (var k = 0; k < zone.metrics.length; k++) {
        var metric = zone.metrics[k];
        var val = formatValue(zd[metric.key], metric.format);
        metricsHTML += '<div class="metric"><div class="metric-value" style="color:' + color + '">' + esc(val) + '</div><div class="metric-label">' + esc(metric.label) + '</div></div>';
      }
      var n = zone.metrics.length;
      var cols = n <= 1 ? "1" : n <= 4 ? "2" : "3";
      html += '<div class="zone-card" style="border-color:' + color + '40;">' +
        '<div class="zone-header" style="border-bottom-color:' + color + '30;">' +
        '<span class="zone-icon">' + icon + '</span>' +
        '<span class="zone-label" style="color:' + color + '">' + esc(label) + '</span>' +
        '</div>' +
        '<div class="zone-metrics" style="grid-template-columns:repeat(' + cols + ',1fr);">' +
        metricsHTML +
        '</div>' +
        '</div>';
    }
  }
  document.getElementById("board").innerHTML = html;
})();
</script>
</body>
</html>
